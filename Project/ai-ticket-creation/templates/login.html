{% extends "base.html" %}
{% block content %}

<style>

/* AI Animated Background */

body{
background:rgb(240,255,255);
height:100vh;
overflow:hidden;
font-family:Arial;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/cubes.png");
animation:moveBG 20s linear infinite;
opacity:0.15;
}

@keyframes moveBG{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* Center Card */

.auth-container{
width:380px;
margin:120px auto;
padding:40px;
border-radius:16px;
background:white;
box-shadow:0 10px 40px rgba(22, 189, 218, 0.2);
animation:fadeIn 1s ease;

position:relative;
z-index:2;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.auth-container h2{
text-align:center;
margin-bottom:30px;
color:#444;
}

/* Inputs */

.input-group{
margin:20px 0;
position:relative;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid hsl(214, 92%, 44%);
border-radius:8px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#4285f4;
box-shadow:0 0 5px rgba(13, 97, 232, 0.5);
}

.error{
color:red;
font-size:12px;
margin-top:5px;
}

/* Password toggle */

.toggle-password{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:14px;
color:#666;
}

/* Google Style Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4285f4;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* Glowing animation */

button::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.5s;
}

button:hover::before{
left:100%;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #4285f4;
}

/* Links */

.extra-links{
text-align:center;
margin-top:20px;
font-size:14px;
}

.extra-links a{
color:#4285f4;
text-decoration:none;
}

.extra-links a{
color:#4285f4;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.extra-links a:hover{
text-decoration:underline;
}

</style>

<div class="auth-container">

<h2>Login</h2>

<form method="POST" action="{{ url_for('login') }}" onsubmit="return validateForm()">

<div class="input-group">

<input type="email" id="email" name="email" placeholder="Email Address" onkeyup="validateEmail()" required>

<div class="error" id="userError"></div>

</div>

<div class="input-group">

<input type="password" id="password" name="password" placeholder="Password" onkeyup="validatePassword()" required>

<span class="toggle-password" onclick="togglePassword()">👁</span>

<div class="error" id="passError"></div>

</div>

<button type="submit">Login</button>

</form>

<div class="extra-links">

<a href="#">Forgot Password?</a><br>

Don't have account?
<a href="{{ url_for('register') }}">Register</a>

</div>

</div>

<script>

/* Show / Hide Password */

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}
else{
pass.type="password";
}

}

/* Username Validation */

function validateEmail(){

let email=document.getElementById("email").value.trim();
let error=document.getElementById("userError");

error.innerHTML="";

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!emailPattern.test(email)){
error.innerHTML="Enter a valid email address";
return false;
}

return true;

}

/* Password Validation */

function validatePassword(){

let password=document.getElementById("password").value.trim();
let error=document.getElementById("passError");

error.innerHTML="";

if(password.length<6){
error.innerHTML="Password must be at least 6 characters";
return false;
}

let strongPassword=/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*?&]{6,}$/;

if(!strongPassword.test(password)){
error.innerHTML="Password must contain letters and numbers";
return false;
}

return true;

}

/* Form Validation */

function validateForm(){

let userValid=validateEmail();
let passValid=validatePassword();

return userValid && passValid;

}

</script>

{% endblock %}
