{% extends "base.html" %}
{% block content %}

<style>
/* Background */
body {
    background: url('/static/images/ai_bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: hsla(210, 13%, 91%, 0.96);
    z-index:-1;
}

/* Glass card */
.auth-container {
    width: 380px;
    margin: 80px auto;
    padding: 40px;
    border-radius: 20px;
    background: rgba(7, 60, 234, 0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px hsla(131, 90%, 49%, 0.20);
    animation: fadeIn 1s ease;
    color: black;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

.auth-container h2 {
    text-align:center;
    margin-bottom:25px;
}

/* Floating label */
.input-group {
    position:relative;
    margin:20px 0;
}

.input-group input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

.input-group label {
    position:absolute;
    left:12px;
    top:12px;
    color:black;
    transition:0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top:-8px;
    left:8px;
    font-size:12px;
    color:black;
}

/* Button */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00ffff,#007bff);
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
}

/* Links */
.extra-links {
    text-align:center;
    margin-top:15px;
}

.extra-links a {
    color:black;
    text-decoration:none;
}
</style>

<div class="auth-container">
    <h2>AI HelpDesk Login</h2>

   <form method="POST" action="{{ url_for('login') }}">
        <div class="input-group">
            <input type="text" name="username" required>
            <label>Username or Email</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="extra-links">
        <a href="#">Forgot Password?</a><br>
        Don't have account?
        <a href="{{ url_for('register') }}">Register</a>
    </div>
</div>

{% endblock %}
