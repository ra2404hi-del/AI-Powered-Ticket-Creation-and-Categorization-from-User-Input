{% extends "base.html" %}
{% block content %}

<style>
body {
    background: #f4f6fb;
    font-family: "Segoe UI", sans-serif;
}

.ticket-card {
    width: 95%;
    max-width: 600px;
    margin: 60px auto;
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.ticket-card h2 {
    margin-bottom: 25px;
    color: #0d6efd;
    text-align: center;
}

.ticket-card input,
.ticket-card textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: none;
    border-bottom: 2px solid #ddd;
    font-size: 15px;
    transition: border 0.3s;
}

.ticket-card input:focus,
.ticket-card textarea:focus {
    border-bottom: 2px solid #0d6efd;
    outline: none;
}

.ticket-card button {
    padding: 14px;
    width: 60%;
    background: #0d6efd;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

.ticket-card button:hover {
    background: #084298;
}
</style>

<div class="ticket-card">
    <h2>🤖 Create Ticket</h2>

    <form action="{{ url_for('create_ticket') }}" method="POST">

        <input type="text" name="title"
               placeholder="Ticket Title" required>

        <textarea name="description"
                  placeholder="Describe your issue..."
                  rows="4" required></textarea>

        <script>
            const today = new Date();
            document.getElementById('date').value =
                today.toISOString().split('T')[0];
        </script>

        <button type="submit">Generate & Save</button>

    </form>
</div>

{% endblock %}
